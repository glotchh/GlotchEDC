<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glotch's Extreme Demon Completions</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#060608] text-neutral-100 font-sans antialiased selection:bg-neutral-800 selection:text-white">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 pb-6 border-b border-neutral-800 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-trophy text-amber-500"></i> Glotch's Extreme Demon Completions
                </h1>
                <p class="text-sm text-neutral-400 mt-1">
                    All GD extreme demons completed by 
                    <a href="https://youtube.com/@glotchh" target="_blank" class="text-white hover:underline font-medium inline-flex items-center gap-1">
                        Glotch <i class="fa-solid fa-external-link text-[10px]"></i>
                    </a>
                </p>
            </div>
            <button onclick="fetchData()" class="bg-white hover:bg-neutral-200 text-black active:scale-95 px-4 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-2 shadow-sm cursor-pointer">
                <i class="fa-solid fa-rotate"></i> Sync Data
            </button>
        </header>

        <div class="bg-neutral-900/50 p-5 rounded-2xl border border-neutral-800 mb-8 flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center backdrop-blur-md">
            
            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center grow">
                <div class="relative w-full sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-neutral-500">
                        <i class="fa-solid fa-layer-group"></i>
                    </span>
                    <select id="difficultyFilter" onchange="filterAndSortData()" class="w-full bg-[#060608] border border-neutral-800 rounded-xl pl-9 pr-4 py-2.5 text-sm text-neutral-200 focus:outline-hidden focus:ring-1 focus:ring-white cursor-pointer appearance-none">
                        <option value="all">All Difficulties (NLW)</option>
                    </select>
                </div>
                
                <div class="relative grow">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-neutral-500">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" oninput="filterAndSortData()" placeholder="Search level name, creator..." class="w-full bg-[#060608] border border-neutral-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-neutral-200 focus:outline-hidden focus:ring-1 focus:ring-white">
                </div>
            </div>

            <div class="flex items-center gap-3 justify-start">
                <div class="flex items-center gap-2 bg-[#060608] border border-neutral-800 rounded-xl p-1">
                    <button onclick="changeSortRule('ranking')" id="sort-ranking" class="px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer bg-white text-black">
                        Default Rank
                    </button>
                    <button onclick="changeSortRule('date')" id="sort-date" class="px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer text-neutral-400 hover:text-neutral-200">
                        Date Done
                    </button>
                    <button onclick="changeSortRule('attempts')" id="sort-attempts" class="px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer text-neutral-400 hover:text-neutral-200">
                        Attempts
                    </button>
                </div>

                <button onclick="toggleSortDirection()" class="bg-[#060608] border border-neutral-800 text-neutral-200 p-2.5 rounded-xl text-sm hover:bg-neutral-900 transition cursor-pointer w-10 h-10 flex items-center justify-center" title="Invert Sorting Direction">
                    <i id="directionIcon" class="fa-solid fa-sort-amount-down"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="animate-spin rounded-full h-12 w-12 border-2 border-neutral-800 border-b-white mb-4"></div>
            <p class="text-neutral-500 font-medium animate-pulse">Parsing Google Sheets output...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-20 bg-neutral-900/20 rounded-2xl border border-dashed border-neutral-800">
            <i class="fa-solid fa-folder-open text-neutral-700 text-4xl mb-3"></i>
            <p class="text-neutral-500 font-medium">No completions matching your parameters found.</p>
        </div>

        <div id="listView" class="flex flex-col gap-4 hidden"></div>
    </div>

<script>
        // Utilizing Google Visualization API wrapper to completely bypass CORS security restrictions on local files
        const SHEET_JSON_URL = 'https://docs.google.com/spreadsheets/d/1vSofYRWmgxZ13DQ1Bj2_jPEQo8dh0W8fv7kV7vpFxO8TAuKB3KXfbVYdCfMCPxBtXd8TcfeVhJLbj9J/gviz/tq?tqx=responseHandler:processGoogleData';

        let rawData = [];
        let currentSortRule = 'ranking'; 
        let sortAscending = true; 

        // The exact ordered sequence of NLW difficulties based on tier ranking weight list
        const DIFFICULTY_ORDER = [
            "all",
            "breaking point",
            "terrifying",
            "relentless",
            "ruthless",
            "merciless",
            "unleashed",
            "impossible"
        ];

        function fetchData() {
            toggleLoader(true);
            
            const oldScript = document.getElementById('sheets-jsonp');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'sheets-jsonp';
            script.src = SHEET_JSON_URL + '&t=' + new Date().getTime();
            
            script.onerror = function() {
                console.error("Dashboard Sync Interrupted");
                alert("Could not load tracking values.\n\nMake sure the spreadsheet is shared as 'Anyone with link can view'.");
                toggleLoader(false);
            };
            
            document.body.appendChild(script);
        }

        window.processGoogleData = function(response) {
            try {
                if (!response || !response.table) throw new Error("Invalid sheet layout returned");
                
                const cols = response.table.cols.map(c => (c.label || '').trim());
                const rows = response.table.rows;
                
                rawData = rows.map((row, index) => {
                    let record = { _defaultRank: index + 1 };
                    cols.forEach((header, colIdx) => {
                        if (header) {
                            const cellValue = row.c[colIdx] ? row.c[colIdx].v : '';
                            record[header] = cellValue !== null ? String(cellValue) : '';
                        }
                    });
                    return record;
                });

                buildDifficultyFilter(cols);
                filterAndSortData();
            } catch (error) {
                console.error("Data conversion error:", error);
                alert("Error processing tracking data structure.");
            } finally {
                toggleLoader(false);
            }
        };

        function buildDifficultyFilter(headers) {
            const diffColumn = headers.find(h => h.toLowerCase().includes('difficulty'));
            if (!diffColumn) return;

            const detectedDifficulties = [...new Set(rawData.map(item => item[diffColumn]))]
                .filter(val => val && val.trim() !== "");

            // Sort target arrays based on predefined tier order list, remaining dynamic options fall to alphabetical back
            detectedDifficulties.sort((a, b) => {
                let idxA = DIFFICULTY_ORDER.indexOf(a.toLowerCase());
                let idxB = DIFFICULTY_ORDER.indexOf(b.toLowerCase());
                if (idxA === -1) idxA = 999;
                if (idxB === -1) idxB = 999;
                return idxA - idxB || a.localeCompare(b);
            });

            const filterDropdown = document.getElementById('difficultyFilter');
            filterDropdown.innerHTML = '<option value="all">All Difficulties (NLW)</option>';
            
            detectedDifficulties.forEach(diff => {
                const opt = document.createElement('option');
                opt.value = diff;
                opt.textContent = diff;
                filterDropdown.appendChild(opt);
            });
        }

        function filterAndSortData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedDiff = document.getElementById('difficultyFilter').value;

            let results = rawData.filter(item => {
                const diffKey = Object.keys(item).find(k => k.toLowerCase().includes('difficulty'));
                const matchesDiff = selectedDiff === 'all' || (diffKey && item[diffKey] === selectedDiff);
                
                const matchesSearch = Object.values(item).some(val => 
                    String(val).toLowerCase().includes(searchTerm)
                );

                return matchesDiff && matchesSearch;
            });

            results.sort((sourceA, sourceB) => {
                let factorA, factorB;

                if (currentSortRule === 'ranking') {
                    factorA = sourceA._defaultRank;
                    factorB = sourceB._defaultRank;
                } else if (currentSortRule === 'attempts') {
                    const attemptKey = Object.keys(sourceA).find(k => k.toLowerCase().includes('attempt'));
                    factorA = attemptKey ? parseInt(sourceA[attemptKey].replace(/,/g, '')) || 0 : 0;
                    factorB = attemptKey ? parseInt(sourceB[attemptKey].replace(/,/g, '')) || 0 : 0;
                } else if (currentSortRule === 'date') {
                    const dateKey = Object.keys(sourceA).find(k => k.toLowerCase().includes('date'));
                    factorA = dateKey ? new Date(sourceA[dateKey]) : 0;
                    factorB = dateKey ? new Date(sourceB[dateKey]) : 0;
                    if (isNaN(factorA)) factorA = 0;
                    if (isNaN(factorB)) factorB = 0;
                }

                if (factorA < factorB) return sortAscending ? -1 : 1;
                if (factorA > factorB) return sortAscending ? 1 : -1;
                return 0;
            });

            renderDashboard(results);
        }

        function renderDashboard(data) {
            const view = document.getElementById('listView');
            const emptyState = document.getElementById('emptyState');

            if (data.length === 0) {
                view.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            view.classList.remove('hidden');

            view.innerHTML = data.map(level => {
                const levelNameKey = Object.keys(level).find(k => k.toLowerCase() === 'level' || k.toLowerCase() === 'name' || k.toLowerCase().includes('level name')) || Object.keys(level)[1];
                const diffKey = Object.keys(level).find(k => k.toLowerCase().includes('difficulty'));
                const attemptKey = Object.keys(level).find(k => k.toLowerCase().includes('attempt'));
                const dateKey = Object.keys(level).find(k => k.toLowerCase().includes('date'));
                const creatorKey = Object.keys(level).find(k => k.toLowerCase().includes('creator') || k.toLowerCase().includes('author'));
                const videoKey = Object.keys(level).find(k => k.toLowerCase().includes('youtube') || k.toLowerCase().includes('video') || k.toLowerCase().includes('link') || k.toLowerCase().includes('url'));

                const rank = level._defaultRank;
                
                // Color formatting definitions for Top ranks (#fff688 for 1-5, Silver variations for 6-10)
                let borderStyle = "border-neutral-800";
                let rankBadgeStyle = "bg-neutral-900 border-neutral-800 text-neutral-400";
                
                if (rank >= 1 && rank <= 5) {
                    borderStyle = "border-[#fff688]/30 shadow-xs shadow-[#fff688]/5";
                    rankBadgeStyle = "bg-[#fff688]/10 border-[#fff688]/30 text-[#fff688]";
                } else if (rank >= 6 && rank <= 10) {
                    borderStyle = "border-neutral-400/30 shadow-xs shadow-white/5";
                    rankBadgeStyle = "bg-neutral-400/10 border-neutral-400/30 text-neutral-300";
                }

                return `
                    <div class="bg-neutral-900/40 border ${borderStyle} p-5 rounded-xl hover:border-neutral-500/40 transition duration-150 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex items-center gap-4 grow">
                            <div class="shrink-0">
                                <span class="font-mono text-xs font-bold px-2.5 py-1 rounded-md border ${rankBadgeStyle}">
                                    #${rank}
                                </span>
                            </div>
                            
                            <div class="space-y-0.5">
                                <h3 class="text-base font-bold text-white tracking-tight line-clamp-1">
                                    ${level[levelNameKey] || 'Unknown Level'}
                                </h3>
                                ${creatorKey && level[creatorKey] ? `<p class="text-xs text-neutral-500">by ${level[creatorKey]}</p>` : ''}
                            </div>
                        </div>

                        <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm sm:justify-end text-neutral-300">
                            ${diffKey && level[diffKey] ? `
                                <div class="flex flex-col sm:items-end">
                                    <span class="text-[10px] text-neutral-500 uppercase tracking-wider font-semibold">Tier</span>
                                    <span class="font-medium text-neutral-200">${level[diffKey]}</span>
                                </div>
                            ` : ''}

                            ${attemptKey && level[attemptKey] ? `
                                <div class="flex flex-col sm:items-end">
                                    <span class="text-[10px] text-neutral-500 uppercase tracking-wider font-semibold">Attempts</span>
                                    <span class="font-mono font-medium text-neutral-200">${Number(level[attemptKey].replace(/,/g, '')).toLocaleString() || level[attemptKey]}</span>
                                </div>
                            ` : ''}
                            
                            ${dateKey && level[dateKey] ? `
                                <div class="flex flex-col sm:items-end">
                                    <span class="text-[10px] text-neutral-500 uppercase tracking-wider font-semibold">Date</span>
                                    <span class="font-medium text-neutral-200">${level[dateKey]}</span>
                                </div>
                            ` : ''}

                            ${videoKey && level[videoKey] ? `
                                <div class="flex items-center pl-2 sm:pl-0">
                                    <a href="${level[videoKey]}" target="_blank" class="bg-neutral-800 hover:bg-neutral-700 text-white p-2 rounded-lg transition flex items-center justify-center w-9 h-9" title="Watch Completion Video">
                                        <i class="fa-brands fa-youtube text-red-500 text-base"></i>
                                    </a>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeSortRule(rule) {
            ['ranking', 'date', 'attempts'].forEach(r => {
                document.getElementById(`sort-${r}`).className = "px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer text-neutral-500 hover:text-neutral-300";
            });
            
            currentSortRule = rule;
            document.getElementById(`sort-${rule}`).className = "px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer bg-white text-black";
            
            sortAscending = (rule === 'ranking' || rule === 'date');
            updateDirectionIcon();
            filterAndSortData();
        }

        function toggleSortDirection() {
            sortAscending = !sortAscending;
            updateDirectionIcon();
            filterAndSortData();
        }

        function updateDirectionIcon() {
            const icon = document.getElementById('directionIcon');
            if (sortAscending) {
                icon.className = "fa-solid fa-sort-amount-up";
            } else {
                icon.className = "fa-solid fa-sort-amount-down";
            }
        }

        function toggleLoader(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('emptyState').classList.add('hidden');
            }
        }

function toggleLoader(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('emptyState').classList.add('hidden');
            }
        }

        // Wait safely until the DOM and window namespaces are fully ready
        window.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
