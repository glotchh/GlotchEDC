<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glotch's Extreme Demon Completions</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#060608] text-neutral-100 font-sans antialiased selection:bg-neutral-800 selection:text-white">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 pb-6 border-b border-neutral-800 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight flex items-center gap-3">
                    <i class="fa-solid fa-trophy text-amber-500"></i> Glotch's Extreme Demon Completions
                </h1>
                <p class="text-sm text-neutral-400 mt-1">
                    All GD extreme demons completed by 
                    <a href="https://youtube.com/@glotchh" target="_blank" class="text-white hover:underline font-medium inline-flex items-center gap-1">
                        Glotch <i class="fa-solid fa-external-link text-[10px]"></i>
                    </a>
                </p>
            </div>
            <button onclick="fetchData()" class="bg-white hover:bg-neutral-200 text-black active:scale-95 px-4 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-2 shadow-sm cursor-pointer">
                <i class="fa-solid fa-rotate"></i> Sync Data
            </button>
        </header>

        <div class="bg-neutral-900/50 p-5 rounded-2xl border border-neutral-800 mb-8 flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center backdrop-blur-md">
            
            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center grow">
                <div class="relative w-full sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-neutral-500">
                        <i class="fa-solid fa-layer-group"></i>
                    </span>
                    <select id="difficultyFilter" onchange="filterAndSortData()" class="w-full bg-[#060608] border border-neutral-800 rounded-xl pl-9 pr-4 py-2.5 text-sm text-neutral-200 focus:outline-hidden focus:ring-1 focus:ring-white cursor-pointer appearance-none">
                        <option value="all">All Difficulties (NLW)</option>
                    </select>
                </div>
                
                <div class="relative grow">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-neutral-500">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" oninput="filterAndSortData()" placeholder="Search level name, creator..." class="w-full bg-[#060608] border border-neutral-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-neutral-200 focus:outline-hidden focus:ring-1 focus:ring-white">
                </div>
            </div>

            <div class="flex items-center gap-3 justify-start">
                <div class="flex items-center bg-[#060608] border border-neutral-800 rounded-xl p-1 h-11 min-w-[280px]">
                    <button onclick="changeSortRule('ranking')" id="sort-ranking" class="flex-1 h-full rounded-lg text-xs font-bold transition cursor-pointer bg-white text-black text-center px-2">
                        Difficulty
                    </button>
                    <button onclick="changeSortRule('date')" id="sort-date" class="flex-1 h-full rounded-lg text-xs font-bold transition cursor-pointer text-neutral-400 hover:text-neutral-200 text-center px-2">
                        Date Done
                    </button>
                    <button onclick="changeSortRule('attempts')" id="sort-attempts" class="flex-1 h-full rounded-lg text-xs font-bold transition cursor-pointer text-neutral-400 hover:text-neutral-200 text-center px-2">
                        Attempts
                    </button>
                </div>

                <button onclick="toggleSortDirection()" class="bg-[#060608] border border-neutral-800 text-neutral-200 p-2.5 rounded-xl text-sm hover:bg-neutral-900 transition cursor-pointer w-11 h-11 flex items-center justify-center" title="Invert Sorting Direction">
                    <i id="directionIcon" class="fa-solid fa-sort-amount-down"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="animate-spin rounded-full h-12 w-12 border-2 border-neutral-800 border-b-white mb-4"></div>
            <p class="text-neutral-500 font-medium animate-pulse">Parsing Google Sheets output...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-20 bg-neutral-900/20 rounded-2xl border border-dashed border-neutral-800">
            <i class="fa-solid fa-folder-open text-neutral-700 text-4xl mb-3"></i>
            <p class="text-neutral-500 font-medium">No completions matching your parameters found.</p>
        </div>

        <div id="listView" class="flex flex-col gap-4 hidden"></div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSofYRWmgxZ13DQ1Bj2_jPEQo8dh0W8fv7kV7vpFxO8TAuKB3KXfbVYdCfMCPxBtXd8TcfeVhJLbj9J/pub?gid=0&single=true&output=csv';

        let rawData = [];
        let currentSortRule = 'ranking'; 
        let sortAscending = true; 

        // Sorted sequence configured to match your exact tracking list order structure
        const DIFFICULTY_ORDER = [
            "all",
            "terrifying",
            "relentless",
            "remorseless",
            "extreme",
            "insane",
            "very hard",
            "hard",
            "medium",
            "easy",
            "beginner"
        ];

        async function fetchData() {
            toggleLoader(true);
            try {
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Network issue fetching Google Sheet data.");
                
                const csvText = await response.text();
                parseCSVData(csvText);
            } catch (error) {
                console.error("Dashboard Sync Interrupted:", error);
                alert("Could not load tracking values.\n\nVerify that your Web Publishing settings are still active inside Google Sheets.");
                toggleLoader(false);
            }
        }

        function parseCSVData(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            if (lines.length < 1) return;

            const splitCSVLine = (line) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            };

            const headers = splitCSVLine(lines[0]).map(h => h.replace(/^"|"$/g, '').trim());
            
            rawData = [];
            for (let i = 1; i < lines.length; i++) {
                const values = splitCSVLine(lines[i]);
                if (values.length === 0 || (values.length === 1 && values[0] === "")) continue;
                
                let record = { _defaultRank: i };
                headers.forEach((header, index) => {
                    if (header) {
                        let val = values[index] || '';
                        val = val.replace(/^"|"$/g, '');
                        record[header] = val;
                    }
                });
                rawData.push(record);
            }

            buildDifficultyFilter(headers);
            filterAndSortData();
            toggleLoader(false);
        }

        function buildDifficultyFilter(headers) {
            const diffColumn = headers.find(h => h.toLowerCase().includes('difficulty'));
            if (!diffColumn) return;

            const detectedDifficulties = [...new Set(rawData.map(item => item[diffColumn]))]
                .filter(val => val && val.trim() !== "");

            detectedDifficulties.sort((a, b) => {
                let idxA = DIFFICULTY_ORDER.indexOf(a.toLowerCase());
                let idxB = DIFFICULTY_ORDER.indexOf(b.toLowerCase());
                if (idxA === -1) idxA = 999;
                if (idxB === -1) idxB = 999;
                return idxA - idxB || a.localeCompare(b);
            });

            const filterDropdown = document.getElementById('difficultyFilter');
            filterDropdown.innerHTML = '<option value="all">All Difficulties (NLW)</option>';
            
            detectedDifficulties.forEach(diff => {
                const opt = document.createElement('option');
                opt.value = diff;
                opt.textContent = diff;
                filterDropdown.appendChild(opt);
            });
        }

        function filterAndSortData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedDiff = document.getElementById('difficultyFilter').value;

            let results = rawData.filter(item => {
                const diffKey = Object.keys(item).find(k => k.toLowerCase().includes('difficulty'));
                const matchesDiff = selectedDiff === 'all' || (diffKey && item[diffKey] === selectedDiff);
                
                const matchesSearch = Object.values(item).some(val => 
                    String(val).toLowerCase().includes(searchTerm)
                );

                return matchesDiff && matchesSearch;
            });

            results.sort((sourceA, sourceB) => {
                let factorA, factorB;

                if (currentSortRule === 'ranking') {
                    factorA = sourceA._defaultRank;
                    factorB = sourceB._defaultRank;
                } else if (currentSortRule === 'attempts') {
                    const attemptKey = Object.keys(sourceA).find(k => k.toLowerCase().includes('attempt'));
                    factorA = attemptKey ? parseInt(sourceA[attemptKey].replace(/,/g, '')) || 0 : 0;
                    factorB = attemptKey ? parseInt(sourceB[attemptKey].replace(/,/g, '')) || 0 : 0;
                } else if (currentSortRule === 'date') {
                    const dateKey = Object.keys(sourceA).find(k => k.toLowerCase().includes('date'));
                    factorA = dateKey ? new Date(sourceA[dateKey]) : 0;
                    factorB = dateKey ? new Date(sourceB[dateKey]) : 0;
                    if (isNaN(factorA)) factorA = 0;
                    if (isNaN(factorB)) factorB = 0;
                }

                if (factorA < factorB) return sortAscending ? -1 : 1;
                if (factorA > factorB) return sortAscending ? 1 : -1;
                return 0;
            });

            renderDashboard(results);
        }

        function renderDashboard(data) {
            const view = document.getElementById('listView');
            const emptyState = document.getElementById('emptyState');

            if (data.length === 0) {
                view.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            view.classList.remove('hidden');

            view.innerHTML = data.map(level => {
                const levelNameKey = Object.keys(level).find(k => k.toLowerCase() === 'level' || k.toLowerCase() === 'name' || k.toLowerCase().includes('level name')) || Object.keys(level)[1];
                const diffKey = Object.keys(level).find(k => k.toLowerCase().includes('difficulty'));
                const attemptKey = Object.keys(level).find(k => k.toLowerCase().includes('attempt'));
                const dateKey = Object.keys(level).find(k => k.toLowerCase().includes('date'));
                const creatorKey = Object.keys(level).find(k => k.toLowerCase().includes('creator') || k.toLowerCase().includes('author'));
                const videoKey = Object.keys(level).find(k => k.toLowerCase().includes('youtube') || k.toLowerCase().includes('video') || k.toLowerCase().includes('link') || k.toLowerCase().includes('url'));

                const rank = level._defaultRank;
                
                // Solid styling setup: locks outline border rules while shifting hover mechanics strictly to background brightness changes
                let baseCardStyle = "bg-neutral-900/40 border-neutral-800 hover:bg-neutral-800/50";
                let rankBadgeStyle = "bg-neutral-900 border-neutral-800 text-neutral-400";
                
                if (rank >= 1 && rank <= 5) {
                    baseCardStyle = "bg-[#fff688]/5 border-[#fff688]/40 hover:bg-[#fff688]/10 shadow-sm shadow-[#fff688]/5";
                    rankBadgeStyle = "bg-[#fff688]/20 border-[#fff688]/50 text-[#fff688] font-black";
                } else if (rank >= 6 && rank <= 10) {
                    baseCardStyle = "bg-neutral-400/5 border-neutral-400/40 hover:bg-neutral-400/10 shadow-sm shadow-white/5";
                    rankBadgeStyle = "bg-neutral-400/20 border-neutral-400/50 text-neutral-200 font-black";
                }

                return `
                    <div class="border ${baseCardStyle} p-6 rounded-xl transition-colors duration-150 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex items-center gap-4 grow">
                            <div class="shrink-0">
                                <span class="font-mono text-sm px-3 py-1.5 rounded-md border ${rankBadgeStyle}">
                                    #${rank}
                                </span>
                            </div>
                            
                            <div class="space-y-0.5">
                                <h3 class="text-lg font-bold text-white tracking-tight line-clamp-1">
                                    ${level[levelNameKey] || 'Unknown Level'}
                                </h3>
                                ${creatorKey && level[creatorKey] ? `<p class="text-sm text-neutral-400">by ${level[creatorKey]}</p>` : ''}
                            </div>
                        </div>

                        <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-base sm:justify-end text-neutral-200">
                            ${diffKey && level[diffKey] ? `
                                <div class="flex flex-col sm:items-end">
                                    <span class="text-[11px] text-neutral-500 uppercase tracking-wider font-semibold">Tier</span>
                                    <span class="font-semibold text-white">${level[diffKey]}</span>
                                </div>
                            ` : ''}

                            ${attemptKey && level[attemptKey] ? `
                                <div class="flex flex-col sm:items-end">
                                    <span class="text-[11px] text-neutral-500 uppercase tracking-wider font-semibold">Attempts</span>
                                    <span class="font-mono font-semibold text-white">${Number(level[attemptKey].replace(/,/g, '')).toLocaleString() || level[attemptKey]}</span>
                                </div>
                            ` : ''}
                            
                            ${dateKey && level[dateKey] ? `
                                <div class="flex flex-col sm:items-end">
                                    <span class="text-[11px] text-neutral-500 uppercase tracking-wider font-semibold">Date</span>
                                    <span class="font-semibold text-white">${level[dateKey]}</span>
                                </div>
                            ` : ''}

                            ${videoKey && level[videoKey] ? `
                                <div class="flex items-center pl-2 sm:pl-0">
                                    <a href="${level[videoKey]}" target="_blank" class="bg-neutral-800 hover:bg-neutral-700 text-white p-2 rounded-lg transition flex items-center justify-center w-10 h-10" title="Watch Completion Video">
                                        <i class="fa-brands fa-youtube text-red-500 text-lg"></i>
                                    </a>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeSortRule(rule) {
            ['ranking', 'date', 'attempts'].forEach(r => {
                document.getElementById(`sort-${r}`).className = "flex-1 h-full rounded-lg text-xs font-bold transition cursor-pointer text-neutral-400 hover:text-neutral-200 text-center px-2";
            });
            
            currentSortRule = rule;
            document.getElementById(`sort-${rule}`).className = "flex-1 h-full rounded-lg text-xs font-bold transition cursor-pointer bg-white text-black text-center px-2";
            
            sortAscending = (rule === 'ranking' || rule === 'date');
            updateDirectionIcon();
            filterAndSortData();
        }

        function toggleSortDirection() {
            sortAscending = !sortAscending;
            updateDirectionIcon();
            filterAndSortData();
        }

        function updateDirectionIcon() {
            const icon = document.getElementById('directionIcon');
            if (sortAscending) {
                icon.className = "fa-solid fa-sort-amount-up";
            } else {
                icon.className = "fa-solid fa-sort-amount-down";
            }
        }

        function toggleLoader(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('emptyState').classList.add('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
